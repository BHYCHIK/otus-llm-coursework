global:
  scrape_interval: 15s
  scrape_timeout: 5s
  evaluation_interval: 10s
  external_labels:
    env: dev

rule_files: []

scrape_configs:
  - job_name: "marketplace_review_parser"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - "host.docker.internal:8000"
        labels:
          app: "marketplace_review_parser"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance